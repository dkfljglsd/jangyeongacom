  <style>
    .page-header { padding: 108px 32px 40px; max-width: 1160px; margin: 0 auto; }
    .page-header h1 { font-size: clamp(32px,4vw,48px); font-weight: 900; letter-spacing: -1px; margin-bottom: 10px; }
    .page-header p { font-size: 16px; color: var(--text-2); }
    .proj-grid { max-width: 1160px; margin: 0 auto; padding: 0 32px 80px; display: grid; grid-template-columns: repeat(3,1fr); gap: 24px; }
    .proj-card { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow-sm); transition: box-shadow .25s, transform .25s; }
    .proj-card:hover { box-shadow: var(--shadow-md); transform: translateY(-4px); }
    .proj-thumb { aspect-ratio: 16/9; background: linear-gradient(135deg, var(--accent-light) 0%, var(--accent-mid) 100%); display: flex; align-items: center; justify-content: center; font-size: 48px; }
    .proj-body { padding: 24px; }
    .proj-body h3 { font-size: 17px; font-weight: 700; margin-bottom: 8px; }
    .proj-body p { font-size: 13px; color: var(--text-2); line-height: 1.6; margin-bottom: 16px; }
    .proj-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 16px; }
    .proj-tags span { font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 50px; background: var(--accent-light); color: #8A6200; border: 1px solid var(--accent-mid); }
    .proj-link { font-size: 13px; font-weight: 700; color: var(--accent); }
    .proj-link:hover { color: var(--accent-hover); }
    @media(max-width:768px){ .proj-grid{ grid-template-columns:1fr; } }
  </style>
